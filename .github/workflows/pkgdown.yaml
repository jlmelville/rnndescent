# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: read

# Only restrict concurrency for non-PR jobs
concurrency:
  group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}

jobs:
  build-site:
    name: Build pkgdown site
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # Pinned from actions/checkout@v3 on 2026-05-24.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      # Pinned from r-lib/actions/setup-pandoc@v2 on 2026-05-24.
      - uses: r-lib/actions/setup-pandoc@a51a8012b0aab7c32ef9d19bf54da93f3254335e

      # Pinned from r-lib/actions/setup-r@v2 on 2026-05-24.
      - uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e
        with:
          use-public-rspm: true

      # Pinned from r-lib/actions/setup-r-dependencies@v2 on 2026-05-24.
      - uses: r-lib/actions/setup-r-dependencies@a51a8012b0aab7c32ef9d19bf54da93f3254335e
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: Rscript -e 'pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)'

      - name: Upload site artifact
        if: github.event_name != 'pull_request'
        # Pinned from actions/upload-artifact@v4 on 2026-05-24.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pkgdown-site
          path: docs
          if-no-files-found: error

  deploy-site:
    name: Deploy pkgdown site
    if: github.event_name != 'pull_request'
    needs: build-site
    runs-on: ubuntu-latest
    # This deploy job needs contents: write to push the built pkgdown site
    # to the gh-pages branch.
    permissions:
      contents: write # zizmor: ignore[undocumented-permissions] required to publish docs
    steps:
      # Pinned from actions/checkout@v3 on 2026-05-24.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Download site artifact
        # Pinned from actions/download-artifact@v4 on 2026-05-24.
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: pkgdown-site
          path: docs

      - name: Deploy to GitHub pages
        # Pinned from JamesIves/github-pages-deploy-action@v4.4.1 on 2026-05-24.
        uses: JamesIves/github-pages-deploy-action@ba1486788b0490a235422264426c45848eac35c6
        with:
          clean: false
          branch: gh-pages
          folder: docs
