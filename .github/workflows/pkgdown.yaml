# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: read

# Only restrict concurrency for non-PR jobs
concurrency:
  group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}

jobs:
  build-site:
    name: Build pkgdown site
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # Pinned to a full-length commit SHA for immutability; Dependabot updates this reference.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      # Pinned to a full-length commit SHA for immutability; Dependabot updates this reference.
      - uses: r-lib/actions/setup-pandoc@a51a8012b0aab7c32ef9d19bf54da93f3254335e

      # Pinned to a full-length commit SHA for immutability; Dependabot updates this reference.
      - uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e
        with:
          use-public-rspm: true

      # Pinned to a full-length commit SHA for immutability; Dependabot updates this reference.
      - uses: r-lib/actions/setup-r-dependencies@a51a8012b0aab7c32ef9d19bf54da93f3254335e
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: Rscript -e 'pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)'

      - name: Upload site artifact
        if: github.event_name != 'pull_request'
        # Pinned to a full-length commit SHA for immutability; Dependabot updates this reference.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pkgdown-site
          path: docs
          if-no-files-found: error

  deploy-site:
    name: Deploy pkgdown site
    if: github.event_name != 'pull_request'
    needs: build-site
    runs-on: ubuntu-latest
    # This deploy job needs contents: write to push the built pkgdown site
    # to the gh-pages branch.
    permissions:
      contents: write # zizmor: ignore[undocumented-permissions] required to publish docs
    steps:
      # Pinned to a full-length commit SHA for immutability; Dependabot updates this reference.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Download site artifact
        # Pinned to a full-length commit SHA for immutability; Dependabot updates this reference.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: pkgdown-site
          path: docs

      - name: Deploy to GitHub pages
        # Pinned to a full-length commit SHA for immutability; Dependabot updates this reference.
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f
        with:
          clean: false
          branch: gh-pages
          folder: docs
