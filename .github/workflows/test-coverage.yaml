on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: test-coverage

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-coverage:
    name: Test coverage
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # Pinned from actions/checkout@v3 on 2026-05-24.
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          persist-credentials: false

      # Pinned from r-lib/actions/setup-r@v2 on 2026-05-24.
      - uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e
        with:
          use-public-rspm: true

      # Pinned from r-lib/actions/setup-r-dependencies@v2 on 2026-05-24.
      - uses: r-lib/actions/setup-r-dependencies@a51a8012b0aab7c32ef9d19bf54da93f3254335e
        with:
          extra-packages: any::covr
          needs: coverage

      - name: Test coverage
        run: Rscript -e 'covr::codecov(quiet = FALSE)'
